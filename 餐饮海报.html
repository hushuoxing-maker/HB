<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐饮海报提示词生成器 · 古月AU智能体</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

.input-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

input,select{
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#ff6a00;
  color:#fff;
  cursor:pointer;
}

.item{
  margin-bottom:15px;
  padding:15px;
  border-radius:10px;
  background:rgba(0,0,0,0.5);
  line-height:1.6;
}

.copy{
  margin-top:10px;
  padding:6px 14px;
  border:none;
  border-radius:6px;
  background:#ee0979;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>餐饮海报提示词生成器 · 古月AU智能体</h1>

<div class="input-box">
  <input id="food" placeholder="输入菜品，例如：烤鱼">
  <button onclick="run()">生成提示词</button>
</div>

<div id="box"></div>

<script>

// 超大变量池（核心）
const layouts=["中心构图","对角线构图","杂志版式","拼贴布局","极简留白","卡片排版","黄金分割","视觉爆点"];
const styles=["国潮","高端餐厅","夜市烟火","电商爆款","ins极简","复古港风","街头潮流","日式清新"];
const colors=["红黄食欲色","黑金高级","霓虹夜市","暖橙光","深色高亮","清新绿"];
const camera=["微距","俯拍","45度","电影光影","硬光","特写"];
const scenes=["夜市","餐厅","外卖封面","街边摊","电商主图","木桌"];
const selling=["爆汁","现炒","秘制","新品","招牌","销量冠军","回头客首选","限时抢"];
const texture=["油亮","热气腾腾","酱汁流动","细节清晰","光泽诱人"];
const copywriting=["第二份半价","限时特价","满减优惠","今日爆款","套餐组合","进店必点"];
const mood=["食欲爆炸","视觉冲击","高级质感","强转化","吸睛引流"];
const light=["柔光","侧光","逆光","强对比光","顶光","环境光"];

// 随机函数
function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// 打乱句子结构（关键）
function buildSentence(food){
  let parts=[
    `主题：${food}`,
    `风格：${rand(styles)}`,
    `构图：${rand(layouts)}`,
    `色彩：${rand(colors)}`,
    `镜头：${rand(camera)}`,
    `场景：${rand(scenes)}`,
    `光影：${rand(light)}`,
    `质感：${rand(texture)}`,
    `卖点：${rand(selling)}`,
    `氛围：${rand(mood)}`,
    `营销：${rand(copywriting)}`
  ];

  // 随机打乱顺序（核心）
  parts.sort(()=>Math.random()-0.5);

  return `餐饮商业海报设计，${parts.join("，")}，主体为高清${food}，商业摄影级质感，信息层级清晰，适用于外卖、电商、门店引流，8K输出`;
}

// 主函数（带去重）
function run(){
  let food=document.getElementById("food").value||"招牌美食";
  let box=document.getElementById("box");
  box.innerHTML="";

  let set=new Set();

  while(set.size < 20){
    let txt = buildSentence(food);
    set.add(txt);
  }

  set.forEach(txt=>{

    let div=document.createElement("div");
    div.className="item";
    div.innerText=txt;

    let btn=document.createElement("button");
    btn.className="copy";
    btn.innerText="复制";

    btn.onclick=()=>{
      navigator.clipboard.writeText(txt);
      btn.innerText="已复制";
      setTimeout(()=>btn.innerText="复制",1500);
    }

    div.appendChild(btn);
    box.appendChild(div);
  });
}

</script>

</body>
</html>
