<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐饮海报提示词生成器 · 顶级设计版</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#ff6a00,#ee0979,#00f2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:flow 6s linear infinite;
}

@keyframes flow{
  0%{background-position:0%}
  100%{background-position:200%}
}

.input-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:30px;
}

input{
  width:300px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
  color:#fff;
  cursor:pointer;
}

.list{
  max-width:1100px;
  margin:auto;
}

.item{
  margin-bottom:20px;
  padding:15px;
  border-radius:10px;
  background:rgba(0,0,0,0.5);

  background-image:linear-gradient(120deg,#ff6a00,#ee0979,#00f2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.copyBox{
  text-align:center;
  margin-bottom:20px;
}

.copy{
  padding:6px 14px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>餐饮海报提示词生成器 · 顶级设计版</h1>

<div class="input-box">
  <input id="food" placeholder="输入菜品，例如：螺蛳粉">
  <button onclick="run()">生成海报提示词</button>
</div>

<div id="box" class="list"></div>

<script>

const layouts=[
"居中主视觉构图","左图右文排版","右图左文排版",
"上下分层排版","对角线动感构图","中轴对称排版",
"大标题压图构图","局部放大特写构图","留白极简构图",
"拼贴式排版","杂志风版式","卡片式分区布局"
];

const styles=[
"国潮风","轻奢风","街头潮流风","日式清新风",
"韩式极简风","夜市烟火气风格","复古港风",
"高端餐厅质感风","电商爆款风","快餐活泼风"
];

const colors=[
"暖橙红色调","高对比撞色","金黑高级配色",
"清新绿色调","夜市霓虹配色","米色高级感",
"红黄食欲配色","深色背景高亮主体"
];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function run(){
  let food=document.getElementById("food").value||"招牌美食";
  let box=document.getElementById("box");
  box.innerHTML="";

  for(let i=0;i<20;i++){

    let txt=`餐饮海报设计，完全正面展示，主题：${food}，版式：${rand(layouts)}，整体风格：${rand(styles)}，色彩方案：${rand(colors)}，画面主体为高清${food}特写，食材细节丰富，油亮质感，热气腾腾，强光影层次，增强食欲感，构图清晰，视觉冲击强，主标题突出“${food}”，字体设计感强，副标题描述产品卖点与口感，加入优惠信息如限时特价/第二份半价/套餐组合，文字排版有节奏感，信息分层明确，辅助元素包含装饰图形、图标、线条、底纹，增强设计感但不抢主体，整体商业写实风格，8K高清，适用于外卖、电商、门店宣传`;

    let div=document.createElement("div");
    div.className="item";
    div.innerText=txt;

    let copyBox=document.createElement("div");
    copyBox.className="copyBox";

    let btn=document.createElement("button");
    btn.className="copy";
    btn.innerText="复制";

    btn.onclick=()=>{
      navigator.clipboard.writeText(txt);
      btn.innerText="已复制";
      setTimeout(()=>btn.innerText="复制",1500);
    }

    copyBox.appendChild(btn);

    box.appendChild(div);
    box.appendChild(copyBox);
  }
}

</script>

</body>
</html>
