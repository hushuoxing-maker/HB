<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐饮海报提示词生成器 · 商业爆款古月AI智能体</title>

<style>
body{
  font-family:"Microsoft YaHei";
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#ff6a00,#ee0979,#00f2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.input-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

input,select{
  padding:10px;
  border:none;
  border-radius:8px;
}

input{
  width:260px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff6a00,#ee0979);
  color:#fff;
  cursor:pointer;
}

.item{
  margin-bottom:15px;
  padding:15px;
  border-radius:10px;
  background:rgba(0,0,0,0.5);
  line-height:1.6;
  position:relative;
}

.copy{
  margin-top:10px;
  padding:6px 14px;
  border:none;
  border-radius:6px;
  background:#ff6a00;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>餐饮海报提示词生成器 · 商业爆款终极版</h1>

<div class="input-box">
  <input id="food" placeholder="输入菜品，例如：烤鱼">
  
  <select id="styleSelect">
    <option value="">全部风格（随机）</option>
    <option>国潮风</option>
    <option>高端餐厅风</option>
    <option>夜市烟火气</option>
    <option>电商爆款风</option>
    <option>极简ins风</option>
  </select>

  <button onclick="run()">生成爆款提示词</button>
</div>

<div id="box"></div>

<script>

// 基础模块
const layouts=[
"中心聚焦构图","黄金分割构图","对角线冲击构图",
"杂志封面布局","拼贴海报结构","极简留白构图",
"卡片式分层排版","视觉爆点构图"
];

const styles=[
"国潮重彩风","高端餐厅摄影风","夜市烟火气",
"电商爆款风","ins极简风","复古港风",
"街头潮流风","日式清新风"
];

const colors=[
"红黄高食欲配色","黑金高级配色",
"霓虹夜市色","暖橙灯光氛围",
"深色背景高亮主体","自然绿色清新风"
];

const camera=[
"微距镜头细节强化","45度商业摄影角度",
"俯拍构图","电影级布光",
"强对比光影","超近景特写"
];

const scenes=[
"夜市摊位","高端餐厅","外卖封面",
"街边小吃","电商主图","木质餐桌"
];

const selling=[
"爆汁香辣","现炒现做","秘制配方",
"每日新鲜出品","招牌爆款","销量冠军",
"回头客首选","限时疯抢","人气必点"
];

const texture=[
"油亮质感","热气腾腾","酱汁流动",
"肉质纹理清晰","高清细节拉满",
"光泽诱人"
];

const copywriting=[
"第二份半价","限时特价","今日爆款",
"满减优惠","套餐组合更划算",
"进店必点"
];

function rand(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function run(){
  let food=document.getElementById("food").value||"招牌美食";
  let styleSelect=document.getElementById("styleSelect").value;
  let box=document.getElementById("box");
  box.innerHTML="";

  for(let i=0;i<20;i++){

    let styleFinal = styleSelect || rand(styles);

    let txt=`餐饮商业海报设计，主题：${food}，采用${rand(layouts)}，整体风格为${styleFinal}，色彩使用${rand(colors)}，拍摄方式为${rand(camera)}，场景设定在${rand(scenes)}，主体为高清${food}，呈现${rand(texture)}效果，突出${rand(selling)}卖点，画面具有强烈食欲冲击与商业转化力，光影层次丰富，视觉冲击强，主标题突出“${food}”，副标题强化口感与产品优势，加入营销信息如${rand(copywriting)}，信息排版清晰有节奏，整体商业广告级表现，适用于外卖平台、电商主图、门店引流，8K高清输出`;

    let div=document.createElement("div");
    div.className="item";
    div.innerText=txt;

    let btn=document.createElement("button");
    btn.className="copy";
    btn.innerText="复制";

    btn.onclick=()=>{
      navigator.clipboard.writeText(txt);
      btn.innerText="已复制";
      setTimeout(()=>btn.innerText="复制",1500);
    }

    div.appendChild(btn);
    box.appendChild(div);
  }
}

</script>

</body>
</html>
